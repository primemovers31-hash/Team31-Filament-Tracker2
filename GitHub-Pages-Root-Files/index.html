<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team31 Filament Tracker</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface2: #2a2a2a;
            --text: #e0e0e0;
            --text-dim: #888;
            --primary: #bb86fc;
            --green: #4CAF50;
            --blue: #2196F3;
            --grey: #9E9E9E;
            --red: #cf6679;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--surface2);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        header h1 span {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.9rem;
            margin-left: 8px;
        }

        #auth-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #auth-status {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .sign-in-btn, .sign-out-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .sign-in-btn {
            background: var(--primary);
            color: #000;
        }

        .sign-out-btn {
            background: var(--surface2);
            color: var(--text-dim);
        }

        .sign-in-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
        }

        .sign-in-screen h2 {
            font-size: 1.5rem;
        }

        .sign-in-screen p {
            color: var(--text-dim);
            max-width: 400px;
            text-align: center;
        }

        .google-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--surface2);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 8px;
            transition: border-color 0.2s;
        }

        .google-btn:hover { border-color: var(--primary); }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .toolbar {
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--surface2);
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        .tab-group {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 4px;
        }

        .tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: #000;
        }

        .tab:hover:not(.active) {
            color: var(--text);
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            padding: 0 24px 8px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--surface2);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .chip.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .chip:hover:not(.active) {
            border-color: var(--text-dim);
        }

        main {
            padding: 8px 24px 24px;
        }

        .spool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
        }

        .spool-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .spool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-color-bar {
            height: 6px;
        }

        .card-body {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .color-swatch {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid var(--surface2);
            flex-shrink: 0;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-info .top-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-info .spool-id {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .card-info .spool-type {
            font-size: 1.05rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info .details {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            white-space: nowrap;
        }

        .status-in-stock { background: var(--green); }
        .status-in-use { background: var(--blue); }
        .status-used-up { background: var(--grey); }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-dim);
        }

        .empty-state h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* Detail modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 24px;
            overflow-y: auto;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            overflow: hidden;
        }

        .modal-color-banner {
            height: 100px;
        }

        .modal-content {
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.4rem;
        }

        .modal-header .sub {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }

        .close-btn:hover { color: var(--text); }

        .detail-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            margin-bottom: 20px;
        }

        .detail-grid .label {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .detail-grid .value {
            font-size: 0.95rem;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { opacity: 0.85; }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
        }

        .notes-field {
            width: 100%;
            min-height: 60px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--surface2);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
        }

        .notes-field:focus { border-color: var(--primary); }

        .notes-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .count-info {
            font-size: 0.85rem;
            color: var(--text-dim);
            padding: 0 24px 8px;
        }

        /* View toggle */
        .view-toggle {
            display: flex;
            gap: 2px;
            background: var(--surface);
            border-radius: 8px;
            padding: 3px;
        }

        .view-btn {
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--surface2);
            color: var(--text);
        }

        .view-btn:hover:not(.active) { color: var(--text); }

        /* Table view */
        .spool-table {
            width: 100%;
            border-collapse: collapse;
            display: none;
        }

        .spool-table.visible { display: table; }

        .spool-table th {
            text-align: left;
            padding: 10px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            border-bottom: 1px solid var(--surface2);
            white-space: nowrap;
            position: sticky;
            top: 0;
            background: var(--bg);
            cursor: pointer;
            user-select: none;
        }

        .spool-table th:hover { color: var(--text); }
        .spool-table th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }

        .spool-table td {
            padding: 10px 12px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--surface2);
            white-space: nowrap;
        }

        .spool-table tr {
            cursor: pointer;
            transition: background 0.1s;
        }

        .spool-table tbody tr:hover { background: var(--surface); }

        .table-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
        }

        /* Printer UI */
        .printer-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--surface2);
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
        }

        .printer-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--grey);
            flex-shrink: 0;
        }

        .printer-bar .dot.connected { background: var(--green); }
        .printer-bar .dot.connecting { background: #FFC107; animation: pulse 1s infinite; }

        @keyframes pulse { 50% { opacity: 0.4; } }

        .printer-bar .status { color: var(--text-dim); flex: 1; }
        .printer-bar .battery { color: var(--text-dim); }

        .printer-connect-btn {
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .printer-connect-btn:hover { background: var(--primary); color: #000; }
        .printer-connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-print {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--text-dim);
        }

        .btn-print:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .print-preview-area {
            margin: 12px 0;
            text-align: center;
        }

        .print-preview-area canvas {
            border: 1px solid var(--surface2);
            border-radius: 4px;
            background: #fff;
        }

        .print-preview-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .spool-grid {
                grid-template-columns: 1fr;
            }
            header { padding: 12px 16px; }
            .toolbar { padding: 12px 16px; }
            main { padding: 8px 16px 16px; }
            .filter-chips { padding: 0 16px 8px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Team31 <span>Filament Tracker</span></h1>
        <div id="auth-area">
            <span id="auth-status">Apps Script mode</span>
            <button class="sign-out-btn" id="refresh-btn">Refresh</button>
        </div>
    </header>

    <div id="app-content">
    <div class="printer-bar" id="printer-bar" style="display:none">
        <div class="dot" id="printer-dot"></div>
        <span class="status" id="printer-status">Not connected</span>
        <span class="battery" id="printer-battery"></span>
        <button class="printer-connect-btn" id="printer-connect-btn">Connect Printer</button>
        <button class="printer-connect-btn" id="print-all-btn" style="display:none;background:var(--green);color:#000">Print All</button>
    </div>
    <div class="toolbar">
        <input type="text" class="search-box" id="search" placeholder="Search filament type, color, notes...">
        <div class="tab-group">
            <button class="tab active" data-tab="active">Inventory</button>
            <button class="tab" data-tab="used-up">Used Up</button>
        </div>
        <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="Card view">&#9638;</button>
            <button class="view-btn" data-view="table" title="Table view">&#9776;</button>
        </div>
    </div>

    <div class="filter-chips" id="filter-chips"></div>
    <div class="count-info" id="count-info"></div>

    <main>
        <div class="spool-grid" id="spool-grid"></div>
        <table class="spool-table" id="spool-table">
            <thead>
                <tr>
                    <th data-sort="color">Color</th>
                    <th data-sort="id">ID</th>
                    <th data-sort="type">Type</th>
                    <th data-sort="name">Name</th>
                    <th data-sort="hex">Hex</th>
                    <th data-sort="weight">Weight</th>
                    <th data-sort="status">Status</th>
                    <th data-sort="date">Produced</th>
                </tr>
            </thead>
            <tbody id="spool-table-body"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none">
            <h2>No spools found</h2>
            <p>Check your Apps Script URL and spreadsheet data, then refresh to load your inventory.</p>
        </div>
    </main>

    </div><!-- end app-content -->

    <!-- Detail modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-color-banner" id="modal-color-banner"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h2 id="modal-title"></h2>
                        <div class="sub" id="modal-sub"></div>
                    </div>
                    <button class="close-btn" id="modal-close">&times;</button>
                </div>
                <div class="action-buttons" id="modal-actions"></div>
                <div class="detail-grid" id="modal-details"></div>
                <div class="notes-label">Notes</div>
                <textarea class="notes-field" id="modal-notes" placeholder="Add notes..."></textarea>
                <div id="print-section" style="display:none; margin-top: 16px;">
                    <div class="notes-label">Label Preview (30mm x 14mm)</div>
                    <div class="print-preview-area">
                        <canvas id="label-canvas" width="232" height="96"></canvas>
                        <div class="print-preview-label">Actual label will print in 1-bit black &amp; white</div>
                    </div>
                    <button class="btn btn-print" id="print-label-btn" disabled>Print Label</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./config.js"></script>
    <script type="module">
        import { FicheroClient, ImageEncoder } from './fichero.js';

        const APP_CONFIG = window.APP_CONFIG || {};
        const APPS_SCRIPT_URL = APP_CONFIG.appsScriptUrl || '';
        const JSONP_TIMEOUT_MS = 15000;

        let allSpools = [];
        let currentTab = 'active';
        let currentView = 'grid';
        let sortCol = 'id';
        let sortAsc = true;
        let searchQuery = '';
        let filterType = null;
        let selectedSpool = null;
        let notesTimeout = null;

        function setStatus(message) {
            document.getElementById('auth-status').textContent = message;
        }

        function buildApiUrl(params = {}) {
            if (!APPS_SCRIPT_URL) {
                throw new Error('Set docs/config.js with your Apps Script web app URL first.');
            }

            const url = new URL(APPS_SCRIPT_URL);
            Object.entries(params).forEach(([key, value]) => {
                url.searchParams.set(key, value);
            });
            return url;
        }

        function jsonp(params = {}) {
            return new Promise((resolve, reject) => {
                const callbackName = `team31Callback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
                const script = document.createElement('script');
                const timer = setTimeout(() => {
                    cleanup();
                    reject(new Error('Apps Script request timed out.'));
                }, JSONP_TIMEOUT_MS);

                function cleanup() {
                    clearTimeout(timer);
                    delete window[callbackName];
                    script.remove();
                }

                window[callbackName] = (payload) => {
                    cleanup();
                    if (!payload || payload.ok === false) {
                        reject(new Error(payload?.error || 'Apps Script request failed.'));
                        return;
                    }
                    resolve(payload);
                };

                try {
                    const url = buildApiUrl({ ...params, callback: callbackName });
                    script.src = url.toString();
                    script.onerror = () => {
                        cleanup();
                        reject(new Error('Could not reach Apps Script.'));
                    };
                    document.body.appendChild(script);
                } catch (err) {
                    cleanup();
                    reject(err);
                }
            });
        }

        function normalizeSpool(raw) {
            const spool = { ...raw };
            const numericFields = [
                'id', 'colorRgba', 'weightGrams', 'diameterMm', 'lengthMeters',
                'dateLastScanned', 'minHotendTempC', 'maxHotendTempC',
                'bedTempC', 'dryingTempC', 'dryingTimeHours'
            ];

            numericFields.forEach((field) => {
                spool[field] = Number(spool[field]) || 0;
            });

            spool.notes = spool.notes || '';
            spool.status = spool.status || 'IN_STOCK';
            return spool;
        }

        async function loadSpools() {
            setStatus('Syncing...');

            try {
                const payload = await jsonp({ action: 'list' });
                allSpools = Array.isArray(payload.spools)
                    ? payload.spools.map(normalizeSpool)
                    : [];
                allSpools.sort((a, b) => (b.dateLastScanned || 0) - (a.dateLastScanned || 0));
                render();
                setStatus(`Synced ${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`);
            } catch (err) {
                console.error('Apps Script load failed:', err);
                allSpools = [];
                render();
                setStatus('Setup needed');
                document.getElementById('empty-state').style.display = 'block';
            }
        }

        // Bambu Lab official color names (hex lowercase → name)
        // Source: Bambu Lab hex code tables + printbusters.io/filament-colors/bambu-lab
        const bambuColors = {
            // PLA Basic (official)
            '#ffffff': 'Jade White', '#000000': 'Black',
            '#c12e1f': 'Red', '#9d432c': 'Brown',
            '#ff6a13': 'Orange', '#6f5034': 'Cocoa Brown',
            '#ff9016': 'Pumpkin Orange', '#e4bd68': 'Gold',
            '#fec600': 'Sunflower Yellow', '#847d48': 'Bronze',
            '#f4ee2a': 'Yellow', '#becf00': 'Bright Green',
            '#3f8e43': 'Mistletoe Green', '#00ae42': 'Bambu Green',
            '#00b1b7': 'Turquoise', '#0086d6': 'Cyan',
            '#0056b8': 'Cobalt Blue', '#5b6579': 'Blue Grey',
            '#0a2989': 'Blue', '#5e43b7': 'Purple',
            '#482960': 'Indigo Purple', '#ec008c': 'Magenta',
            '#f5547c': 'Hot Pink', '#f55a74': 'Pink',
            '#9d2235': 'Maroon Red', '#545454': 'Dark Gray',
            '#f7e6de': 'Beige', '#8e9089': 'Gray',
            '#a6a9aa': 'Silver', '#d1d3d5': 'Light Gray',
            // PLA Matte (official)
            '#de4343': 'Scarlet Red', '#b15533': 'Terracotta',
            '#f99963': 'Mandarin Orange', '#d3b7a7': 'Latte Brown',
            '#4d3324': 'Dark Chocolate', '#7d6556': 'Dark Brown',
            '#ae835b': 'Caramel', '#e8dbb7': 'Desert Tan',
            '#cbc6b8': 'Bone White', '#f7d959': 'Lemon Yellow',
            '#68724d': 'Dark Green', '#c2e189': 'Apple Green',
            '#61c680': 'Grass Green', '#0078bf': 'Marine Blue',
            '#ae96d4': 'Lilac Purple', '#e8afcf': 'Sakura Pink',
            '#950051': 'Plum', '#bb3d43': 'Dark Red',
            '#042f56': 'Dark Blue', '#a3d8e1': 'Ice Blue',
            '#9b9ea0': 'Ash Gray',
            // PLA Basic (additional shades)
            '#9cdbd9': 'Arctic Whisper',
            // PETG
            '#002e96': 'Blue', '#eb3a3a': 'Red', '#a3a6a6': 'Gray',
        };

        function colorName(rgba) {
            const hex = rgbaToHex(rgba).toLowerCase();
            if (bambuColors[hex]) return bambuColors[hex];
            // Nearest-match: find closest color within distance 30
            const r1 = (rgba >> 16) & 0xFF, g1 = (rgba >> 8) & 0xFF, b1 = rgba & 0xFF;
            let bestName = null, bestDist = 31;
            for (const [h, name] of Object.entries(bambuColors)) {
                const r2 = parseInt(h.slice(1,3),16), g2 = parseInt(h.slice(3,5),16), b2 = parseInt(h.slice(5,7),16);
                const d = Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
                if (d < bestDist) { bestDist = d; bestName = name; }
            }
            return bestName || hex;
        }

        function displayColorName(spool) {
            return spool.colorNameText || colorName(spool.colorRgba);
        }

        // Helpers
        // colorRgba is stored as ARGB int (Android format): A bits 24-31, R bits 16-23, G bits 8-15, B bits 0-7
        function rgbaToHex(rgba) {
            if (!rgba && rgba !== 0) return '#000000';
            const r = (rgba >> 16) & 0xFF;
            const g = (rgba >> 8) & 0xFF;
            const b = rgba & 0xFF;
            return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function rgbaToCSS(rgba) {
            if (!rgba && rgba !== 0) return '#333';
            const r = (rgba >> 16) & 0xFF;
            const g = (rgba >> 8) & 0xFF;
            const b = rgba & 0xFF;
            return `rgb(${r},${g},${b})`;
        }

        function contrastBorder(rgba) {
            if (!rgba && rgba !== 0) return '#555';
            const r = (rgba >> 16) & 0xFF;
            const g = (rgba >> 8) & 0xFF;
            const b = rgba & 0xFF;
            // Relative luminance (ITU-R BT.709)
            const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
            return lum < 0.4 ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';
        }

        function statusClass(status) {
            return 'status-' + (status || 'in-stock').toLowerCase().replace('_', '-');
        }

        function statusLabel(status) {
            switch (status) {
                case 'IN_STOCK': return 'In Stock';
                case 'IN_USE': return 'In Use';
                case 'USED_UP': return 'Used Up';
                default: return status || 'Unknown';
            }
        }

        function formatId(id) {
            return '#' + String(id || 0).padStart(3, '0');
        }

        function spoolType(s) {
            return s.detailedType || s.filamentType || 'Unknown';
        }

        // Filter + render
        function getFiltered() {
            let spools = allSpools.filter(s => {
                if (currentTab === 'active') return s.status !== 'USED_UP';
                return s.status === 'USED_UP';
            });

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                spools = spools.filter(s =>
                    (s.filamentType || '').toLowerCase().includes(q) ||
                    (s.detailedType || '').toLowerCase().includes(q) ||
                    (s.notes || '').toLowerCase().includes(q) ||
                    (s.colorNameText || '').toLowerCase().includes(q) ||
                    rgbaToHex(s.colorRgba).toLowerCase().includes(q) ||
                    displayColorName(s).toLowerCase().includes(q) ||
                    formatId(s.id).includes(q)
                );
            }

            if (filterType) {
                spools = spools.filter(s => spoolType(s) === filterType);
            }

            return spools;
        }

        function getTypes() {
            const active = allSpools.filter(s => currentTab === 'active' ? s.status !== 'USED_UP' : s.status === 'USED_UP');
            const types = new Set(active.map(s => spoolType(s)).filter(t => t && t !== 'Unknown'));
            return [...types].sort();
        }

        function render() {
            renderChips();
            if (currentView === 'grid') {
                document.getElementById('spool-grid').style.display = '';
                document.getElementById('spool-table').classList.remove('visible');
                renderGrid();
            } else {
                document.getElementById('spool-grid').style.display = 'none';
                document.getElementById('spool-table').classList.add('visible');
                renderGrid();   // still needed for empty state + count
                renderTable();
            }
        }

        function renderChips() {
            const types = getTypes();
            const container = document.getElementById('filter-chips');
            container.innerHTML = types.map(t =>
                `<button class="chip ${filterType === t ? 'active' : ''}" data-type="${esc(t)}">${esc(t)}</button>`
            ).join('');

            container.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const type = chip.dataset.type;
                    filterType = filterType === type ? null : type;
                    render();
                });
            });
        }

        function renderGrid() {
            const spools = getFiltered();
            const grid = document.getElementById('spool-grid');
            const empty = document.getElementById('empty-state');
            const countEl = document.getElementById('count-info');

            countEl.textContent = `${spools.length} spool${spools.length !== 1 ? 's' : ''}`;

            if (spools.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            if (currentView === 'table') return;  // table renders separately

            grid.innerHTML = spools.map(s => `
                <div class="spool-card" data-id="${s.id}">
                    <div class="card-color-bar" style="background:${rgbaToCSS(s.colorRgba)}"></div>
                    <div class="card-body">
                        <div class="color-swatch" style="background:${rgbaToCSS(s.colorRgba)};border-color:${contrastBorder(s.colorRgba)}"></div>
                        <div class="card-info">
                            <div class="top-row">
                                <span class="spool-id">${formatId(s.id)}</span>
                                <span class="spool-type">${esc(s.detailedType || s.filamentType || 'Unknown')}</span>
                            </div>
                            <div class="details">
                                <span>${esc(displayColorName(s))} ${rgbaToHex(s.colorRgba)}</span>
                                ${s.weightGrams > 0 ? `<span>${esc(String(s.weightGrams))}g</span>` : ''}
                                ${s.productionDate ? `<span>${esc(s.productionDate)}</span>` : ''}
                            </div>
                        </div>
                        <div class="status-badge ${statusClass(s.status)}">${esc(statusLabel(s.status))}</div>
                    </div>
                </div>
            `).join('');

            grid.querySelectorAll('.spool-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    selectedSpool = allSpools.find(s => s.id === id);
                    if (selectedSpool) openModal(selectedSpool);
                });
            });
        }

        function getSorted(spools) {
            return [...spools].sort((a, b) => {
                let va, vb;
                switch (sortCol) {
                    case 'id': va = a.id || 0; vb = b.id || 0; break;
                    case 'type': va = (a.detailedType || a.filamentType || '').toLowerCase(); vb = (b.detailedType || b.filamentType || '').toLowerCase(); break;
                    case 'name': va = displayColorName(a).toLowerCase(); vb = displayColorName(b).toLowerCase(); break;
                    case 'hex': va = rgbaToHex(a.colorRgba); vb = rgbaToHex(b.colorRgba); break;
                    case 'weight': va = a.weightGrams || 0; vb = b.weightGrams || 0; break;
                    case 'status': va = a.status || ''; vb = b.status || ''; break;
                    case 'date': va = a.productionDate || ''; vb = b.productionDate || ''; break;
                    case 'color':
                        // Sort by hue for visual grouping
                        va = colorHue(a.colorRgba); vb = colorHue(b.colorRgba); break;
                    default: va = a.id || 0; vb = b.id || 0;
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        function colorHue(rgba) {
            const r = ((rgba >> 16) & 0xFF) / 255;
            const g = ((rgba >> 8) & 0xFF) / 255;
            const b = (rgba & 0xFF) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            if (max === min) return 0;
            let h;
            const d = max - min;
            if (max === r) h = ((g - b) / d + 6) % 6;
            else if (max === g) h = (b - r) / d + 2;
            else h = (r - g) / d + 4;
            return h * 60;
        }

        function renderTable() {
            const spools = getSorted(getFiltered());
            const tbody = document.getElementById('spool-table-body');

            // Update sort arrows
            document.querySelectorAll('.spool-table th').forEach(th => {
                const arrow = th.querySelector('.sort-arrow');
                if (arrow) arrow.remove();
                if (th.dataset.sort === sortCol) {
                    th.insertAdjacentHTML('beforeend',
                        `<span class="sort-arrow">${sortAsc ? '\u25B2' : '\u25BC'}</span>`);
                }
            });

            if (spools.length === 0) {
                tbody.innerHTML = '';
                return;
            }

            tbody.innerHTML = spools.map(s => `
                <tr data-id="${s.id}">
                    <td><span class="table-swatch" style="background:${rgbaToCSS(s.colorRgba)};border:2px solid ${contrastBorder(s.colorRgba)}"></span></td>
                    <td>${formatId(s.id)}</td>
                    <td>${esc(s.detailedType || s.filamentType || 'Unknown')}</td>
                    <td>${esc(displayColorName(s))}</td>
                    <td style="font-family:monospace">${rgbaToHex(s.colorRgba)}</td>
                    <td>${s.weightGrams > 0 ? esc(String(s.weightGrams)) + 'g' : '-'}</td>
                    <td><span class="status-badge ${statusClass(s.status)}">${esc(statusLabel(s.status))}</span></td>
                    <td>${esc(s.productionDate || '-')}</td>
                </tr>
            `).join('');

            tbody.querySelectorAll('tr').forEach(row => {
                row.addEventListener('click', () => {
                    const id = parseInt(row.dataset.id);
                    selectedSpool = allSpools.find(s => s.id === id);
                    if (selectedSpool) openModal(selectedSpool);
                });
            });
        }

        // Modal
        function openModal(spool) {
            document.getElementById('modal-color-banner').style.background = rgbaToCSS(spool.colorRgba);
            document.getElementById('modal-title').textContent =
                `${formatId(spool.id)}  ${spool.detailedType || spool.filamentType}`;
            document.getElementById('modal-sub').textContent = spool.filamentType || '';

            // Details
            const details = document.getElementById('modal-details');
            let rows = '';
            rows += detailRow('Status', statusLabel(spool.status));
            rows += detailRow('Tag UID', spool.tagUid || '-');
            rows += detailRow('Color', `${displayColorName(spool)} (${rgbaToHex(spool.colorRgba)})`);
            if (spool.brand) rows += detailRow('Brand', spool.brand);
            if (spool.location) rows += detailRow('Location', spool.location);
            if (spool.sealed) rows += detailRow('Sealed', spool.sealed);
            if (spool.amountRemaining) rows += detailRow('Remaining', spool.amountRemaining);
            if (spool.orderAgain) rows += detailRow('Order again', spool.orderAgain);
            if (spool.weightGrams > 0) rows += detailRow('Weight', spool.weightGrams + 'g');
            if (spool.diameterMm > 0) rows += detailRow('Diameter', spool.diameterMm + 'mm');
            if (spool.lengthMeters > 0) rows += detailRow('Length', spool.lengthMeters + 'm');
            if (spool.productionDate) rows += detailRow('Produced', spool.productionDate);
            if (spool.maxHotendTempC > 0) {
                rows += detailRow('Hotend', `${spool.minHotendTempC}-${spool.maxHotendTempC}\u00B0C`);
                if (spool.bedTempC > 0) rows += detailRow('Bed', spool.bedTempC + '\u00B0C');
                if (spool.dryingTempC > 0) rows += detailRow('Drying', `${spool.dryingTempC}\u00B0C for ${spool.dryingTimeHours}h`);
            }
            details.innerHTML = rows;

            // Actions
            const actions = document.getElementById('modal-actions');
            let btns = '';
            if (spool.status === 'IN_STOCK') {
                btns += `<button class="btn btn-primary" data-action="IN_USE">Put in printer</button>`;
                btns += `<button class="btn btn-danger" data-action="USED_UP">Spool is empty / remove</button>`;
            } else if (spool.status === 'IN_USE') {
                btns += `<button class="btn btn-primary" data-action="IN_STOCK">Remove from printer</button>`;
                btns += `<button class="btn btn-danger" data-action="USED_UP">Spool is empty / remove</button>`;
            } else {
                btns += `<button class="btn btn-secondary" data-action="IN_STOCK">Restore to inventory</button>`;
            }
            actions.innerHTML = btns;

            actions.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const newStatus = btn.dataset.action;
                    await updateSpoolStatus(spool, newStatus);
                    closeModal();
                });
            });

            // Notes
            const notesEl = document.getElementById('modal-notes');
            notesEl.value = spool.notes || '';

            // Label preview
            if (hasBluetooth) {
                renderLabel(spool);
                updatePrintButton();
            }

            document.getElementById('modal-overlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            selectedSpool = null;
        }

        function detailRow(label, value) {
            return `<span class="label">${esc(label)}</span><span class="value">${esc(String(value))}</span>`;
        }

        async function updateSpoolStatus(spool, newStatus) {
            setStatus(`Updating ${formatId(spool.id)}...`);
            await jsonp({
                action: 'updateStatus',
                id: String(spool.id),
                status: newStatus
            });

            spool.status = newStatus;
            spool.dateLastScanned = Date.now();
            render();
            setStatus(`Updated ${formatId(spool.id)}`);
        }

        async function updateSpoolNotes(spool, notes) {
            await jsonp({
                action: 'updateNotes',
                id: String(spool.id),
                notes
            });

            spool.notes = notes;
            setStatus(`Saved notes for ${formatId(spool.id)}`);
        }

        // Event listeners
        document.getElementById('search').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        document.getElementById('refresh-btn').addEventListener('click', () => {
            loadSpools();
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                filterType = null;
                render();
            });
        });

        // View toggle
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                render();
            });
        });

        // Table column sort
        document.querySelectorAll('.spool-table th').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.sort;
                if (sortCol === col) {
                    sortAsc = !sortAsc;
                } else {
                    sortCol = col;
                    sortAsc = true;
                }
                renderTable();
            });
        });

        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('modal-notes').addEventListener('input', (e) => {
            if (!selectedSpool) return;
            const spool = selectedSpool;
            clearTimeout(notesTimeout);
            notesTimeout = setTimeout(() => {
                updateSpoolNotes(spool, e.target.value);
            }, 800);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // ===== Fichero Printer Integration =====
        const hasBluetooth = typeof navigator !== 'undefined' && 'bluetooth' in navigator;
        let printer = null;
        let printerConnected = false;

        function initPrinterUI() {
            const bar = document.getElementById('printer-bar');
            if (!hasBluetooth) {
                bar.style.display = 'none';
                return;
            }
            bar.style.display = 'flex';

            document.getElementById('printer-connect-btn').addEventListener('click', togglePrinter);
            document.getElementById('print-all-btn').addEventListener('click', printAllLabels);
        }

        async function togglePrinter() {
            if (printerConnected) {
                printer.disconnect();
                return;
            }
            await connectPrinter();
        }

        async function connectPrinter() {
            const btn = document.getElementById('printer-connect-btn');
            const dot = document.getElementById('printer-dot');
            const status = document.getElementById('printer-status');

            btn.disabled = true;
            btn.textContent = 'Connecting...';
            dot.className = 'dot connecting';
            status.textContent = 'Connecting...';

            try {
                printer = new FicheroClient();

                printer.on('disconnect', () => {
                    printerConnected = false;
                    dot.className = 'dot';
                    status.textContent = 'Disconnected';
                    btn.textContent = 'Connect Printer';
                    btn.disabled = false;
                    document.getElementById('printer-battery').textContent = '';
                    updatePrintButton();
                });

                printer.on('heartbeat', ({ data }) => {
                    if (data.chargeLevel != null) {
                        const bat = document.getElementById('printer-battery');
                        bat.textContent = data.charging ? `${data.chargeLevel}% charging` : `${data.chargeLevel}%`;
                    }
                });

                await printer.connect();

                printerConnected = true;
                dot.className = 'dot connected';
                status.textContent = 'Fichero D11s connected';
                btn.textContent = 'Disconnect';
                btn.disabled = false;
                updatePrintButton();
            } catch (err) {
                console.error('Printer connection failed:', err);
                dot.className = 'dot';
                status.textContent = err.message || 'Connection failed';
                btn.textContent = 'Connect Printer';
                btn.disabled = false;
                printer = null;
            }
        }

        function updatePrintButton() {
            const btn = document.getElementById('print-label-btn');
            if (btn) {
                btn.disabled = !printerConnected;
            }
            const allBtn = document.getElementById('print-all-btn');
            if (allBtn) {
                allBtn.style.display = printerConnected ? 'inline-block' : 'none';
            }
        }

        async function printAllLabels() {
            const spools = allSpools.filter(s => s.status !== 'USED_UP');
            if (spools.length === 0) return;

            const btn = document.getElementById('print-all-btn');
            btn.disabled = true;

            try {
                for (let i = 0; i < spools.length; i++) {
                    btn.textContent = `Printing ${i + 1}/${spools.length}...`;
                    const printCanvas = renderLabelForPrint(spools[i]);
                    const encoded = ImageEncoder.encodeCanvas(printCanvas, 'left');

                    const task = printer.abstraction.newPrintTask('B1', {
                        totalPages: 1,
                        density: 2,
                        speed: 0,
                        labelType: 1,
                        statusPollIntervalMs: 200,
                        statusTimeoutMs: 15000,
                    });

                    await task.printInit();
                    await task.printPage(encoded, 1);
                    await task.waitForFinished();
                    await task.printEnd();

                    // Wait for printer to finish feeding before next label
                    if (i < spools.length - 1) {
                        await new Promise(r => setTimeout(r, 2000));
                    }
                }

                btn.textContent = `All ${spools.length} printed!`;
                setTimeout(() => {
                    btn.textContent = 'Print All';
                    btn.disabled = false;
                }, 3000);
            } catch (err) {
                console.error('Print all failed:', err);
                btn.textContent = `Print failed at ${btn.textContent}`;
                setTimeout(() => {
                    btn.textContent = 'Print All';
                    btn.disabled = false;
                }, 5000);
            }
        }

        // Label rendering — 200x96 canvas (~25mm x 12mm at 203 DPI)
        // Smaller width leaves margin on 30mm label to prevent overrun
        // Print direction is "left", so canvas gets rotated 90° CW before rasterizing
        // Layout: Line 1 = filament type, Line 2 = color name, Line 3 = ID + hex
        function drawLabel(ctx, spool, W, H) {
            const pad = 6;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#000';
            ctx.textBaseline = 'top';
            ctx.font = '900 28px sans-serif';
            ctx.fillText(spool.detailedType || spool.filamentType || 'Unknown', pad, 4, W - pad * 2);
            ctx.fillText(displayColorName(spool), pad, 36, W - pad * 2);
            ctx.font = '900 20px monospace';
            ctx.fillText(`${formatId(spool.id)} ${rgbaToHex(spool.colorRgba)}`, pad, 68, W - pad * 2);
        }

        function renderLabel(spool) {
            const canvas = document.getElementById('label-canvas');
            drawLabel(canvas.getContext('2d'), spool, canvas.width, canvas.height);
        }

        // Render label for 1-bit printing with threshold to fix anti-aliasing
        function renderLabelForPrint(spool) {
            const canvas = document.createElement('canvas');
            canvas.width = 232;
            canvas.height = 96;
            const ctx = canvas.getContext('2d');
            const W = canvas.width;
            const H = canvas.height;
            drawLabel(ctx, spool, W, H);

            // Threshold: convert anti-aliased grey pixels to solid black/white
            // The image encoder only treats R=0 as black, so grey pixels are lost
            const imgData = ctx.getImageData(0, 0, W, H);
            const px = imgData.data;
            for (let i = 0; i < px.length; i += 4) {
                const grey = px[i] * 0.299 + px[i+1] * 0.587 + px[i+2] * 0.114;
                if (grey < 128) {
                    px[i] = px[i+1] = px[i+2] = 0;       // black
                } else {
                    px[i] = px[i+1] = px[i+2] = 255;     // white
                }
                px[i+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);

            return canvas;
        }

        async function printLabel() {
            if (!printerConnected || !printer || !selectedSpool) return;

            const btn = document.getElementById('print-label-btn');
            btn.disabled = true;
            btn.textContent = 'Printing...';

            try {
                const printCanvas = renderLabelForPrint(selectedSpool);
                const encoded = ImageEncoder.encodeCanvas(printCanvas, 'left');

                const task = printer.abstraction.newPrintTask('B1', {
                    totalPages: 1,
                    density: 2,
                    speed: 0,
                    labelType: 1,       // WithGaps
                    statusPollIntervalMs: 200,
                    statusTimeoutMs: 10000,
                });

                await task.printInit();
                await task.printPage(encoded, 1);
                await task.waitForFinished();
                await task.printEnd();

                btn.textContent = 'Printed!';
                setTimeout(() => {
                    btn.textContent = 'Print Label';
                    btn.disabled = !printerConnected;
                }, 2000);
            } catch (err) {
                console.error('Print failed:', err);
                btn.textContent = 'Print failed';
                setTimeout(() => {
                    btn.textContent = 'Print Label';
                    btn.disabled = !printerConnected;
                }, 3000);
            }
        }

        // Hook up print button
        document.getElementById('print-label-btn').addEventListener('click', printLabel);

        // Show printer UI if Web Bluetooth is available
        if (hasBluetooth) {
            initPrinterUI();
            document.getElementById('print-section').style.display = 'block';
        }

        loadSpools();
    </script>
</body>
</html>
